<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather Dashboard</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<!-- Search -->
	<header class="search-bar">
		<input type="text" placeholder="Enter city name..." class="search-input">
		<button class="search-btn">Search</button>
	</header>

	<section class="current-weather-card">
		<h2 class="skeleton">City Name</h2>
		<p class="skeleton">Temperature</p>
		<p class="skeleton">Weather Description</p>
		<p class="skeleton">Humidity</p>
		<p class="skeleton">Wind Speed</p>
		<p class="skeleton">Time</p>
	</section>

	<section class="forecast">
		<div class="forecast-grid">
			<div class="forecast-card skeleton">Day 1</div>
			<div class="forecast-card skeleton">Day 2</div>
			<div class="forecast-card skeleton">Day 3</div>
			<div class="forecast-card skeleton">Day 4</div>
			<div class="forecast-card skeleton">Day 5</div>
			<div class="forecast-card skeleton">Day 6</div>
			<div class="forecast-card skeleton">Day 7</div>
		</div>
	</section>

	<script src="app.js"></script>
</body>
</html>
